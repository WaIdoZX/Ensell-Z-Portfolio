function filterGallery(category) {

    const photos = document.querySelectorAll(".gallery img");

    photos.forEach(function(photo) {

        if (category === "all" || photo.dataset.category === category) {
            photo.style.display = "block";
        } else {
            photo.style.display = "none";
        }

    });
}
    
function openImage(src) {

document.getElementById("modalImage").src = src;

document.getElementById("imageModal").style.display =
"flex";

}

function closeImage() {

document.getElementById("imageModal").style.display =
"none";

}

function toggleFlashMute() {
    if (!currentFlashPlayer) return;

    const muteBtn = document.getElementById("muteBtn");

    try {
        if (!flashMuted) {
            currentFlashPlayer.volume = 0;
            muteBtn.innerHTML = "🔈 Unmute Music";
            flashMuted = true;
        } else {
            currentFlashPlayer.volume = 1;
            muteBtn.innerHTML = "🔊 Mute Music";
            flashMuted = false;
        }
    } catch (error) {
        alert("Mute may not work with this Flash file in Ruffle.");
    }
}
