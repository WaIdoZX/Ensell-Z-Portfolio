<!DOCTYPE html>
<html>
<head>
<title>Zackery Ensell Portfolio</title>

<style>
body {
    background: #202020;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
}

h1 {
    text-align: center;
    color: #00ff44;
    font-size: 42px;
    letter-spacing: 3px;
}

.figure {
    position: relative;
    width: 420px;
    height: 310px;
    margin: 40px auto;
}

.head {
    position: absolute;
    left: 150px;
    top: 50px;
    width: 130px;
    height: 130px;
    background: white;
    border: 7px solid black;
    border-radius: 50%;
}

.head img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
}

.tab {
    position: absolute;
    background: white;
    color: black;
    border: 6px solid black;
    border-radius: 30px;
    padding: 10px 18px;
    font-weight: bold;
    cursor: pointer;
}

.tab:hover {
    background: #00ff44;
}

.about {
    left: 25px;
    top: 55px;
    transform: rotate(-15deg);
}

.vr {
    left: 25px;
    top: 120px;
    transform: rotate(-25deg);
}

.projects {
    left: 155px;
    top: 205px;
    transform: rotate(28deg);
}

.contact {
    left: 315px;
    top: 115px;
    transform: rotate(90deg);
}

.box {
    width: 90%;
    margin: 30px auto;
    background: #303030;
    border: 4px solid #00ff44;
    padding: 25px;
    box-sizing: border-box;
}

h2 {
    color: #00ff44;
}
</style>
</head>

<body>

<h1>ZACKERY ENSELL</h1>

<div class="figure">
    <button class="tab about" onclick="showText('about')">ABOUT</button>
    <button class="tab vr" onclick="showText('vr')">VR DEV</button>

    <div class="head">
        <img src="profile.jpg" alt="">
    </div>

    <button class="tab projects" onclick="showText('projects')">PROJECTS</button>
    <button class="tab contact" onclick="showText('contact')">CONTACT</button>
</div>

<div id="infoBox" class="box">
    <h2>About Me</h2>
    <p>Hi, I'm Zackery Ensell. I enjoy VR development, electronics, programming, animation, and game design.</p>
</div>

<script>
function showText(section) {
    var box = document.getElementById("infoBox");

    if (section === "about") {
        box.innerHTML = "<h2>About Me</h2><p>Hi, I'm Zackery Ensell. I enjoy VR development, electronics, programming, animation, and game design.</p>";
    }

    if (section === "vr") {
        box.innerHTML = "<h2>VR Development</h2><p>C++, OpenXR, Valve Index, SteamVR, computer hardware, and troubleshooting.</p>";
    }

    if (section === "projects") {
        box.innerHTML = "<h2>Projects</h2><ul><li>OpenXR VR Learning Project</li><li>Fantasy Mine Flash Project</li><li>Portfolio Website</li></ul>";
    }

    if (section === "contact") {
        box.innerHTML = "<h2>Contact</h2><p>Email: your-email@example.com</p><p>GitHub: WaldoZX</p>";
    }
}
</script>

</body>
</html>
