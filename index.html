<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zackery Ensell Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="#" onclick="showBox('about')">About Me</a>
        <a href="#" onclick="showBox('skills')">Skills</a>
        <a href="#" onclick="showBox('projects')">Projects</a>
        <a href="#" onclick="showBox('contact')">Contact</a>
    </nav>

    <h1>Zackery Ensell</h1>

    <div id="contentBox" class="blank-box">
        Click a tab above.
    </div>

    <script>
        function showBox(section) {
            const box = document.getElementById("contentBox");

            if (section === "about") {
                box.innerHTML = `
                    <h2>About Me</h2>
                    <div class="image-placeholder">
                        Blank Image Area
                    </div>
                `;
            }

            if (section === "skills") {
                box.innerHTML = `
                    <h2>Skills</h2>
                    <p>Put your skills here.</p>
                `;
            }

            if (section === "projects") {
                box.innerHTML = `
                    <h2>Projects</h2>
                    <p>Put your projects here.</p>
                `;
            }

            if (section === "contact") {
                box.innerHTML = `
                    <h2>Contact</h2>
                    <p>Email: your-email@example.com</p>
                `;
            }
        }
    </script>

</body>
</html>
