```
<h1>Zackery Ensell</h1>

<nav>
    <a onclick="showBox('about')">About Me</a>
    <a onclick="showBox('skills')">Skills</a>
    <a onclick="showBox('projects')">Projects</a>
    <a onclick="showBox('contact')">Contact</a>
</nav>

<div id="contentBox" class="blank-box">
    <h2>Welcome</h2>
    <p>Click a tab above.</p>
</div>

<script>
    function showBox(section) {
        const box = document.getElementById("contentBox");

        if (section === "about") {
            box.style.backgroundColor = "#000000";
            box.style.color = "#ffffff";

            box.innerHTML = `
                <h2>About Me</h2>
                <div class="image-placeholder">
                    Your Picture Here
                </div>
                <p>Add information about yourself here.</p>
            `;
        }

        if (section === "skills") {
            box.style.backgroundColor = "#ff0000";
            box.style.color = "#ffffff";

            box.innerHTML = `
                <h2>Skills</h2>
                <ul>
                    <li>C++ Programming</li>
                    <li>VR Development</li>
                    <li>Computer Hardware</li>
                    <li>GitHub</li>
                </ul>
            `;
        }

        if (section === "projects") {
            box.style.backgroundColor = "#ff8800";
            box.style.color = "#ffffff";

            box.innerHTML = `
                <h2>Projects</h2>
                <ul>
                    <li>OpenXR VR Project</li>
                    <li>7 Days To Die VR Setup</li>
                    <li>Portfolio Website</li>
                </ul>
            `;
        }

        if (section === "contact") {
            box.style.backgroundColor = "#ffffff";
            box.style.color = "#000000";

            box.innerHTML = `
                <h2>Contact</h2>
                <p>Email: your-email@example.com</p>
            `;
        }
    }
</script>
```
