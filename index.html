<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<script>
let flashMuted = false;
let currentFlashPlayer = null;

    "<h2>Resume</h2>" +

    "</ul>" +

    "<h3>Work Experience</h3>" +

    "<li><strong>Site Technician - Peregrine Team</strong><br>November 2025 – June 2026</li>" +

    "<p><strong>Job Description:</strong> Helped keep data center rooms clean and ready for servers by controlling dust, cleaning around equipment, and cleaning the inside and outside of machines using proper cleaning procedures.</p>" +

    "<p><strong>Equipment Used:</strong></p>" +

    "<li>Vacuum</li>" +

    "<li>Anti-static rags</li>" +

    "<li>Automatic floor scrubber</li>" +
    "</ul>" +

    "<p><strong>Skills Used:</strong> Attention to detail, dust control, equipment-safe cleaning, safety awareness, and working in a data center environment.</p>"+
        
    "<p><a href='Resume.pdf' target='_blank'>📄 View Resume PDF</a></p>";
}
    
function showAbout() {
    document.getElementById("content").innerHTML =
    "<h2>About Me</h2><p>Hi, I'm Zackery Ensell. I enjoy VR development, electronics, programming, animation, and game design.</p>";

function showVR() {
    document.getElementById("content").innerHTML =
    "<h2>VR Development</h2>" +
    "<ul>" +
    "<li>OpenXR</li>" +
    "<li>C++</li>" +
    "<li>Valve Index</li>" +
    "<li>SteamVR</li>" +
    "<li>Game Development</li>" +
    "</ul>";
}

function showProjects() {
    document.getElementById("content").innerHTML =
    "<h2>Projects</h2>" +

    "<h3>Fantasy Mine</h3>" +

    "<p><strong>Date Created:</strong> April 18, 2013</p>" +

    "<p><strong>Role:</strong> Graphic Design and Animation</p>" +

    "<p><strong>Team Members:</strong> Zackery Ensell and William Riley</p>" +

    "<p><strong>Music:</strong> Original music composed by Yoko Shimomura (copyright belongs to the original creator).</p>" +

    "<p><strong>Description:</strong> Fantasy Mine is an Adobe Flash animation/game project created during my Media Communications program. I worked on the graphic design, animation, visual effects, and project development.</p>" +

    "<button id='muteBtn' onclick='toggleFlashMute()'>🔊 Mute Music</button>" +

    "<div id='flash-player'></div>";

    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    const container = document.getElementById("flash-player");

    container.appendChild(player);

    player.style.width = "800px";
    player.style.height = "600px";

    player.load("Fantasy-mine.swf");

    currentFlashPlayer = player;
    flashMuted = false;
}

function showContact() {
    document.getElementById("content").innerHTML =
    "<h2>Contact</h2><p>Email: zackery.ensell@outlook.com</p><p>GitHub: YourGitHub</p>";
}

function showPhotogathery() {

    document.getElementById("content").innerHTML = `

    <h2>Photography Gallery</h2>

    <div class="photo-controls">
        <button onclick="filterGallery('all')">All</button>
        <button onclick="filterGallery('macro')">Macro / Close-Up</button>
        <button onclick="filterGallery('forest')">Forest & Trails</button>
        <button onclick="filterGallery('landscape')">Landscape</button>
        <button onclick="filterGallery('objects')">Objects</button>
        <button onclick="filterGallery('portrait')">Portrait</button>
    </div>

    <div class="gallery">

        <img data-category="macro" src="copyrightPhotos/IMG_9677_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="macro" src="copyrightPhotos/IMG_7043_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="macro" src="copyrightPhotos/IMG_9540_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="macro" src="copyrightPhotos/IMG_9808_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="macro" src="copyrightPhotos/IMG_9477_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="macro" src="copyrightPhotos/IMG_9480_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="macro" src="copyrightPhotos/IMG_9583_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="macro" src="copyrightPhotos/IMG_9469_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="macro" src="copyrightPhotos/IMG_9588_watermarked.jpg" onclick="openImage(this.src)">

        <img data-category="forest" src="copyrightPhotos/IMG_7054_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="forest" src="copyrightPhotos/IMG_9820_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="forest" src="copyrightPhotos/IMG_9465_watermarked.jpg" onclick="openImage(this.src)">

        <img data-category="landscape" src="copyrightPhotos/IMG_9481_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="landscape" src="copyrightPhotos/IMG_9462_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="landscape" src="copyrightPhotos/IMG_9536_watermarked.jpg" onclick="openImage(this.src)">

        <img data-category="objects" src="copyrightPhotos/IMG_7060_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="objects" src="copyrightPhotos/IMG_9475_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="objects" src="copyrightPhotos/IMG_9676_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="objects" src="copyrightPhotos/IMG_9671_watermarked.jpg" onclick="openImage(this.src)">
        <img data-category="objects" src="copyrightPhotos/IMG_9674_watermarked.jpg" onclick="openImage(this.src)">

        <img data-category="portrait" src="copyrightPhotos/copyrightphoto.png" onclick="openImage(this.src)">
    </div>

    `;
}

function filterGallery(category) {

    const photos = document.querySelectorAll(".gallery img");

    photos.forEach(function(photo) {

        if (category === "all" || photo.dataset.category === category) {
            photo.style.display = "block";
        } else {
            photo.style.display = "none";
        }

    });
}
    
function openImage(src) {

document.getElementById("modalImage").src = src;

document.getElementById("imageModal").style.display =
"flex";

}

function closeImage() {

document.getElementById("imageModal").style.display =
"none";

}

function toggleFlashMute() {
    if (!currentFlashPlayer) return;

    const muteBtn = document.getElementById("muteBtn");

    try {
        if (!flashMuted) {
            currentFlashPlayer.volume = 0;
            muteBtn.innerHTML = "🔈 Unmute Music";
            flashMuted = true;
        } else {
            currentFlashPlayer.volume = 1;
            muteBtn.innerHTML = "🔊 Mute Music";
            flashMuted = false;
        }
    } catch (error) {
        alert("Mute may not work with this Flash file in Ruffle.");
    }
}
</script>

<div id="imageModal" class="modal" onclick="closeImage()">
    <img id="modalImage">
</div>
    
</body>
</html>
