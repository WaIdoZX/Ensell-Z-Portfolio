<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zackery Ensell</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>ZACKERY ENSELL</h1>

<div class="corner-menu">
    <div class="orb">
        <img src="profile.jpg" alt="Profile">
    </div>

    <div class="menu-buttons">
        <button onclick="showAbout()">ABOUT</button>
        <button onclick="showVR()">VR DEV</button>
        <button onclick="showProjects()">PROJECTS</button>
        <button onclick="showContact()">CONTACT</button>
        <button onclick="showResume()">RESUME</button>
    </div>
</div>

<div class="content" id="content">
    <h2>About Me</h2>
    <p>
        Hi, I'm Zackery Ensell. I enjoy VR development,
        electronics, programming, animation, and game design.
    </p>
</div>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<script>
let flashMuted = false;
let currentFlashPlayer = null;

function showResume() {
    document.getElementById("content").innerHTML =
    "<h2>Resume</h2>" +
    "<h3>Education</h3>" +
    "<p>Media Communication Technology Certificate</p>" +

    "<h3>Awards</h3>" +
    "<ul>" +
    "<li>Career & Technical Education Honor Roll</li>" +
    "<li>Career & Technical Education Perfect Attendance</li>" +
    "<li>Career & Technical Education Outstanding Student</li>" +
    "</ul>" +

    "<h3>Work Experience</h3>" +
    "<ul>" +
    "<li>Site Technician - Peregrine Team</li>" +
    "<li>Cleaning Technician - Intandem</li>" +
    "<li>Cleaner - CleanMark</li>" +
    "</ul>" +

    "<p><a href='Resume.pdf' target='_blank'>📄 View Resume PDF</a></p>";
}
    
function showAbout() {
    document.getElementById("content").innerHTML =
    "<h2>About Me</h2><p>Hi, I'm Zackery Ensell. I enjoy VR development, electronics, programming, animation, and game design.</p>";
}

function showVR() {
    document.getElementById("content").innerHTML =
    "<h2>VR Development</h2>" +
    "<ul>" +
    "<li>OpenXR</li>" +
    "<li>C++</li>" +
    "<li>Valve Index</li>" +
    "<li>SteamVR</li>" +
    "<li>Game Development</li>" +
    "</ul>";
}

function showProjects() {
    document.getElementById("content").innerHTML =
    "<h2>Projects</h2>" +

    "<h3>Fantasy Mine</h3>" +

    "<p><strong>Date Created:</strong> April 18, 2013</p>" +

    "<p><strong>Role:</strong> Graphic Design and Animation</p>" +

    "<p><strong>Team Members:</strong> Zackery Ensell and William Riley</p>" +

    "<p><strong>Music:</strong> Original music composed by Yoko Shimomura (copyright belongs to the original creator).</p>" +

    "<p><strong>Description:</strong> Fantasy Mine is an Adobe Flash animation/game project created during my Media Communications program. I worked on the graphic design, animation, visual effects, and project development.</p>" +

    "<button id='muteBtn' onclick='toggleFlashMute()'>🔊 Mute Music</button>" +

    "<div id='flash-player'></div>";

    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    const container = document.getElementById("flash-player");

    container.appendChild(player);

    player.style.width = "800px";
    player.style.height = "600px";

    player.load("Fantasy-mine.swf");

    currentFlashPlayer = player;
    flashMuted = false;
}

function showContact() {
    document.getElementById("content").innerHTML =
    "<h2>Contact</h2><p>Email: your@email.com</p><p>GitHub: YourGitHub</p>";
}

function toggleFlashMute() {
    if (!currentFlashPlayer) return;

    const muteBtn = document.getElementById("muteBtn");

    try {
        if (!flashMuted) {
            currentFlashPlayer.volume = 0;
            muteBtn.innerHTML = "🔈 Unmute Music";
            flashMuted = true;
        } else {
            currentFlashPlayer.volume = 1;
            muteBtn.innerHTML = "🔊 Mute Music";
            flashMuted = false;
        }
    } catch (error) {
        alert("Mute may not work with this Flash file in Ruffle.");
    }
}
</script>

</body>
</html>
