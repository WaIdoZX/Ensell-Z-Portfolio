<!DOCTYPE html>
<html>
<head>
    <title>Zackery Ensell Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Zackery Ensell</h1>

<nav>
    <button onclick="showBox('about')">About Me</button>
    <button onclick="showBox('skills')">Skills</button>
    <button onclick="showBox('projects')">Projects</button>
    <button onclick="showBox('contact')">Contact</button>
</nav>

<div id="contentBox" class="blank-box">
    <h2>Welcome</h2>
    <p>Click a button above.</p>
</div>

<script>
function showBox(section) {
    var box = document.getElementById("contentBox");

    if (section == "about") {
        box.style.backgroundColor = "black";
        box.style.color = "white";
        box.innerHTML = "<h2>About Me</h2><div class='image-placeholder'>Image Here</div>";
    }

    if (section == "skills") {
        box.style.backgroundColor = "red";
        box.style.color = "white";
        box.innerHTML = "<h2>Skills</h2><p>C++, VR Development, Computer Hardware, GitHub</p>";
    }

    if (section == "projects") {
        box.style.backgroundColor = "orange";
        box.style.color = "white";
        box.innerHTML = "<h2>Projects</h2><p>OpenXR VR Project, Portfolio Website</p>";
    }

    if (section == "contact") {
        box.style.backgroundColor = "white";
        box.style.color = "black";
        box.innerHTML = "<h2>Contact</h2><p>Email: your-email@example.com</p>";
    }
}
</script>

</body>
</html>
